name: Year Progress
on:
  schedule:
    - cron: '0 1 * * *'  # 每天北京时间 9:00 自动运行
  workflow_dispatch:        # 支持手动测试
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python year_progress.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
